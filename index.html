<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Patient Monitor</title>

<style>
body{
background:#111;
color:white;
font-family:Arial;
padding:20px;
text-align:center;
}

.card{
background:#222;
padding:15px;
margin:10px auto;
border-radius:12px;
max-width:500px;
font-size:26px;
}

details{
max-width:700px;
margin:10px auto;
background:#222;
border-radius:10px;
padding:10px;
text-align:left;
}

summary{
font-size:22px;
cursor:pointer;
font-weight:bold;
padding:10px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
padding:10px;
border:1px solid #444;
text-align:center;
}

th{
background:#333;
}
</style>
</head>

<body>

<h1>Patient Monitoring</h1>

<div class="card" id="temp">Temp: --</div>
<div class="card" id="hr">HR: --</div>
<div class="card" id="spo2">SpO2: --</div>
<div class="card" id="status">Status: --</div>
<div class="card" id="time">Time: --</div>

<h2>History</h2>

<div id="historyBox"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
apiKey:"AIzaSyC9eQNZPtqWXfjy85v6Bfnpm77t648ih8",
authDomain:"real-time-patient-monito-76d69.firebaseapp.com",
databaseURL:"https://real-time-patient-monito-76d69-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"real-time-patient-monito-76d69",
storageBucket:"real-time-patient-monito-76d69.firebasestorage.app",
messagingSenderId:"807607602018",
appId:"1:807607602018:web:5110875164e2873bb77a3b"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// LIVE DATA
onValue(ref(db,"patient/live"),(snap)=>{

const d = snap.val();
if(!d) return;

document.getElementById("temp").innerHTML   = "Temp: " + d.temp + " °C";
document.getElementById("hr").innerHTML     = "HR: " + d.hr + " BPM";
document.getElementById("spo2").innerHTML   = "SpO2: " + d.spo2 + " %";
document.getElementById("time").innerHTML   = "Time: " + d.time;

// FIXED STATUS
document.getElementById("status").innerHTML = "Status: " + d.status;

});

// HISTORY RETRACTABLE
onValue(ref(db,"patient/history"),(snap)=>{

const data = snap.val();
if(!data) return;

let html = "";

for(const day in data){

html += `
<details>
<summary>${day}</summary>

<table>
<thead>
<tr>
<th>Time</th>
<th>Temp</th>
<th>HR</th>
<th>SpO2</th>
</tr>
</thead>
<tbody>
`;

for(const tm in data[day]){

const r = data[day][tm];

html += `
<tr>
<td>${tm}</td>
<td>${r.temp}</td>
<td>${r.hr}</td>
<td>${r.spo2}</td>
</tr>
`;

}

html += `
</tbody>
</table>
</details>
`;

}

document.getElementById("historyBox").innerHTML = html;

});

</script>

</body>
</html>
